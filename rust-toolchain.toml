[toolchain]
# Pin nightly (with wasm32 target + rust-src component) because the
# `.cargo/config.toml` uses `[unstable] build-std = ["std", "panic_abort"]`
# to rebuild std from source with `target-cpu=mvp`. Without this path, the
# pre-built libstd.rlib bundled with stable rustc was compiled with post-
# MVP wasm features (bulk-memory, sign-ext) that NEAR's VM rejects with
# `CompilationError::Deserialization`. Confirmed experimentally on testnet:
# stable-built wasm fails to load; nightly + build-std + MVP succeeds.
#
# Pinning nightly (unpinned) rather than a dated nightly is the same
# tradeoff the sibling repo (near-sequencer-demo) accepts via a rustup
# directory override. Cargo.lock is committed for dep reproducibility.
channel = "nightly"
targets = ["wasm32-unknown-unknown"]
components = ["rust-src"]
profile = "minimal"
